<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUB Plantillas Web | EdvynKaris</title>
<style>
    :root {
        --bg-color: #000000;
        --primary-neon: #bc13fe;
        --glow: 0 0 15px #bc13fe, 0 0 30px #bc13fe;
        --text-color: #ffffff;
    }

    body {
        margin: 0;
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: 'Segoe UI', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
    }

    header {
        text-align: center;
        margin-bottom: 40px;
    }

    h1 {
        color: var(--primary-neon);
        text-shadow: var(--glow);
        font-size: 2.5rem;
        text-transform: uppercase;
    }

    .honeycomb {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        max-width: 1200px;
        gap: 20px;
        padding: 20px;
    }

    .hex {
        position: relative;
        width: 250px; 
        height: 288px;
        background-color: #111;
        overflow: hidden;
        /* El recorte hexagonal */
        clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        cursor: pointer;
        border: none;
    }

    .hex:hover {
        transform: scale(1.1);
        z-index: 10;
    }

    /* Brillo neón externo al hexágono */
    .hex::after {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        box-shadow: inset 0 0 0 3px var(--primary-neon);
        opacity: 0;
        transition: opacity 0.3s;
    }

    .hex:hover::after {
        opacity: 1;
    }

    /* CONTENEDOR MAESTRO */
    .iframe-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
    }

    /* EL FIX DEFINITIVO: Forzamos resolución de escritorio y centramos con traslación */
    iframe {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 1300px; /* Forzamos ancho de desktop real */
        height: 1600px;
        border: none;
        /* El 0.22 es la clave: es ligeramente más grande que el hueco para tapar las orillas blancas */
        transform: translate(-50%, -50%) scale(0.22);
        transform-origin: center;
    }

    .hex-info {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(2px);
        transition: all 0.3s ease;
        opacity: 0;
        z-index: 5;
    }

    .hex:hover .hex-info {
        opacity: 1;
    }

    .hex-info h3 {
        color: var(--primary-neon);
        text-shadow: 0 0 10px var(--primary-neon);
        font-size: 1.5rem;
        text-transform: uppercase;
        border: 2px solid var(--primary-neon);
        padding: 10px 20px;
        background: rgba(0,0,0,0.8);
    }
</style>
</head>
<body>

    <header>

    <script>
        const honeycomb = document.getElementById('honeycomb');

        // Ajuste 2: Clic directo para abrir en nueva pestaña
        honeycomb.addEventListener('click', (e) => {
            const clickedHex = e.target.closest('.hex');
            if (clickedHex) {
                const url = clickedHex.getAttribute('data-url');
                window.open(url, '_blank');
            }
